<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TutoTuto プロトタイプ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== ヘッダ ===== */
    header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 12px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .header-icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #555;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .header-icon-btn:hover { background: #f0f2f5; }
    .header-icon-btn.active { background: #e8f0fd; color: #2c7be5; }

    .header-divider {
      width: 1px;
      height: 20px;
      background: #e0e0e0;
      margin: 0 4px;
      flex-shrink: 0;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #c0c8d8 transparent;
      min-width: 0;
      padding-bottom: 2px;
    }

    .breadcrumbs::-webkit-scrollbar { height: 3px; }
    .breadcrumbs::-webkit-scrollbar-thumb { background: #c0c8d8; border-radius: 2px; }

    .breadcrumb-item {
      font-size: 13px;
      color: #2c7be5;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 10px;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .breadcrumb-item:hover { background: #e8f0fd; }
    .breadcrumb-item.current { color: #333; cursor: default; font-weight: 600; }
    .breadcrumb-item.current:hover { background: none; }
    .breadcrumb-sep { color: #bbb; font-size: 13px; flex-shrink: 0; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* ===== パネルコンテナ ===== */
    .panel-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel.state-current  { transform: translateX(0); }
    .panel.state-behind   { transform: translateX(-30%); }
    .panel.state-incoming { transform: translateX(100%); }

    /* ===== パネルコンテンツ ===== */
    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      -webkit-overflow-scrolling: touch;
      background: #f5f5f5;
    }

    .panel-content {
      padding: 20px;
      position: relative;
      min-height: 100%;
    }

    /* ===== ドキュメント風レイアウト（PDF・AI回答共通） ===== */
    .doc-page {
      background: white;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      padding: 32px 28px;
      min-height: 400px;
      font-size: 15px;
      line-height: 1.8;
      color: #222;
    }

    .doc-page h3 {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    .doc-problem {
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    .doc-answer-area {
      border: 1px dashed #aaa;
      border-radius: 4px;
      min-height: 80px;
      padding: 12px;
      background: #fafafa;
      color: #c0392b;
      font-size: 18px;
      font-style: italic;
      margin-top: 8px;
    }

    .doc-section {
      margin-bottom: 20px;
    }

    .doc-section-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .doc-result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .doc-result-badge.wrong { background: #fde8e8; color: #c0392b; }
    .doc-result-badge.correct { background: #e8f8e8; color: #27ae60; }

    .doc-answer-text {
      font-size: 20px;
      font-weight: 700;
      color: #2c7be5;
      font-family: 'Courier New', monospace;
    }

    .doc-explanation {
      font-size: 15px;
      line-height: 1.8;
      color: #333;
    }

    /* 解答記入パネル */
    .answer-canvas {
      border: 2px dashed #aaa;
      border-radius: 8px;
      min-height: 140px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c0392b;
      font-size: 18px;
      font-style: italic;
      margin: 12px 0 20px;
    }

    .send-btn-large {
      width: 100%;
      padding: 14px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .send-btn-large:hover { background: #1a6cd4; }

    /* 質問記入パネル */
    .capture-preview {
      border: 2px solid #2c7be5;
      border-radius: 8px;
      min-height: 90px;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c7be5;
      font-size: 13px;
      gap: 8px;
      margin: 8px 0 20px;
    }

    .question-textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .question-textarea:focus { border-color: #2c7be5; }

    .hint-text {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      padding: 8px;
      margin-top: 16px;
    }

    /* ===== 選択オーバーレイ ===== */
    .selection-overlay {
      position: absolute;
      inset: 0;
      cursor: crosshair;
      z-index: 10;
    }

    .selection-rect {
      position: absolute;
      border: 2px solid #2c7be5;
      background: rgba(44, 123, 229, 0.12);
      border-radius: 3px;
      pointer-events: none;
      display: none;
    }
    .header-icon-btn svg { width: 20px; height: 20px; stroke-width: 2px; }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<header>
  <div class="header-left">
    <button class="header-icon-btn" title="ホーム"><i data-lucide="home"></i></button>
    <button class="header-icon-btn active" title="ページビュー"><i data-lucide="book-open"></i></button>
    <button class="header-icon-btn" title="AB比較"><i data-lucide="columns"></i></button>
    <div class="header-divider"></div>
    <div class="breadcrumbs" id="breadcrumbs"></div>
  </div>
  <div class="header-right" id="toolbarRight">
    <!-- パネルに応じて動的に変わる -->
  </div>
</header>

<div class="panel-viewport" id="panelViewport"></div>

<script>
// ===== ダミーデータ =====
const DUMMY_RESPONSES = {
  scoring: {
    yourAnswer: 'x = 2',
    correctAnswer: 'x = 3',
    explanation: '移項するとき、符号が変わることに注意しましょう。\n\n2x + 5 = 11 を解くには、まず両辺から5を引きます。\n2x = 6 となり、両辺を2で割ると x = 3 です。\n\nあなたは 2x = 4 と計算してしまいました。移項後の計算を確認しましょう。'
  },
  ai: [
    {
      title: 'なぜ移項で符号が変わるの？',
      content: `移項とは、等式の一方の辺の項を他方の辺に移すことです。\n\nこのとき符号が変わる理由は、「等式の両辺に同じ数を加えても等式は成り立つ」という性質を使っているからです。\n\n例えば、x + 3 = 7 を解くとき：\n両辺から3を引く → x + 3 - 3 = 7 - 3\nつまり x = 4\n\n「+3を移項して-3になる」と言いますが、本質的には「両辺から3を引いている」のです。`
    },
    {
      title: '類似問題で練習してみよう',
      content: `では、次の問題を解いてみてください。\n\n【練習問題】\n① 3x + 2 = 11\n② 5x - 7 = 13\n③ 2x + 9 = 3\n\n①のヒント：まず両辺から2を引いてみましょう。\n3x = 9 となります。あとは両辺を3で割るだけです。`
    },
    {
      title: 'この単元の要点',
      content: `一次方程式を解く手順：\n\n1. 文字を含む項を左辺に\n2. 数だけの項を右辺に集める（移項）\n3. ax = b の形にする\n4. 両辺を a で割る\n\nよくあるミス：\n・移項した後の符号を忘れる\n・両辺を割るとき計算ミス\n・分数の計算ミス`
    }
  ]
};

// ===== 状態管理 =====
let panels = [];
let currentIndex = -1;
let selection = null;
let isSelecting = false;
let selectionStart = { x: 0, y: 0 };
let activeOverlay = null;
let activeSelectionRect = null;
let aiResponseIndex = 0;

// ===== ツールバー更新 =====
function updateToolbar() {
  const toolbar = document.getElementById('toolbarRight');
  const type = panels[currentIndex]?.type;

  if (type === 'pdf' || type === 'scoring' || type === 'ai') {
    toolbar.innerHTML = `
      <button class="header-icon-btn active" title="ペン"><i data-lucide="pen-tool"></i></button>
      <button class="header-icon-btn" title="テキスト"><i data-lucide="type"></i></button>
      <button class="header-icon-btn" title="消しゴム"><i data-lucide="eraser"></i></button>
      <button class="header-icon-btn" title="範囲選択"><i data-lucide="scan"></i></button>
    `;
  } else if (type === 'answer') {
    toolbar.innerHTML = `
      <button class="header-icon-btn active" title="ペン"><i data-lucide="pen-tool"></i></button>
      <button class="header-icon-btn" title="テキスト"><i data-lucide="type"></i></button>
      <button class="header-icon-btn" title="消しゴム"><i data-lucide="eraser"></i></button>
      <button class="header-icon-btn" title="採点する" onclick="handleScoring()"><i data-lucide="check-circle"></i></button>
    `;
  } else if (type === 'question') {
    toolbar.innerHTML = `
      <button class="header-icon-btn active" title="ペン"><i data-lucide="pen-tool"></i></button>
      <button class="header-icon-btn" title="テキスト"><i data-lucide="type"></i></button>
      <button class="header-icon-btn" title="消しゴム"><i data-lucide="eraser"></i></button>
      <button class="header-icon-btn" title="送る" onclick="handleQuestionSend()"><i data-lucide="send"></i></button>
    `;
  } else {
    toolbar.innerHTML = '';
  }
}

// ===== パネルHTML生成 =====
function createPDFPanelContent() {
  return `
    <div class="doc-page">
      <h3>中学数学 方程式 ── 第3問</h3>
      <div class="doc-problem">次の方程式を解きなさい。</div>
      <div style="font-size:22px; font-family:'Courier New',monospace; padding:20px 0;">
        2x + 5 = 11
      </div>
      <div style="font-size:14px; color:#888; margin-bottom:6px;">【解答欄】</div>
      <div class="doc-answer-area">x = 2　←（生徒の解答）</div>
    </div>
    <div class="hint-text">採点したい範囲をドラッグで囲んでください</div>
  `;
}

function createAnswerPanelContent() {
  return `
    <div class="doc-page">
      <h3>解答記入</h3>
      <div class="doc-section">
        <div class="doc-section-label">採点対象</div>
        <div style="background:#f0f4ff; border-radius:6px; padding:14px; font-family:'Courier New',monospace; font-size:18px;">
          2x + 5 = 11
        </div>
      </div>
      <div class="doc-section">
        <div class="doc-section-label">解答欄（ペンで記入）</div>
        <div class="answer-canvas">x = 2　←（生徒の解答）</div>
      </div>
    </div>
  `;
}

function createScoringPanelContent(data) {
  return `
    <div class="doc-page">
      <h3>採点結果</h3>
      <div class="doc-result-badge wrong"><i data-lucide="x-circle" style="width: 20px; height: 20px;"></i> 不正解</div>
      <div class="doc-section">
        <div class="doc-section-label">あなたの解答</div>
        <div class="doc-answer-text">${data.yourAnswer}</div>
      </div>
      <div class="doc-section">
        <div class="doc-section-label">正解</div>
        <div class="doc-answer-text">${data.correctAnswer}</div>
      </div>
      <div class="doc-section">
        <div class="doc-section-label">解説</div>
        <div class="doc-explanation">${data.explanation.replace(/\n/g, '<br>')}</div>
      </div>
    </div>
    <div class="hint-text">気になるところをドラッグで囲んで質問できます</div>
  `;
}

function createAIPanelContent(data) {
  return `
    <div class="doc-page">
      <h3>AI サポート</h3>
      <div class="doc-section">
        <div style="font-size:16px; font-weight:700; color:#2c7be5; margin-bottom:12px;">${data.title}</div>
        <div class="doc-explanation">${data.content.replace(/\n/g, '<br>')}</div>
      </div>
    </div>
    <div class="hint-text">さらに気になるところを囲んで深掘りできます</div>
  `;
}

function createQuestionPanelContent(captureLabel) {
  return `
    <div class="doc-page">
      <h3>質問記入</h3>
      <div class="doc-section">
        <div class="doc-section-label">選択箇所（${captureLabel}）</div>
        <div class="capture-preview">
          <i data-lucide="camera" style="width: 24px; height: 24px;"></i> キャプチャ範囲
        </div>
      </div>
      <div class="doc-section">
        <div class="doc-section-label">質問・コメント（ペンで記入）</div>
        <div class="answer-canvas" style="color:#333; font-style:normal; font-size:15px;">ここに質問を記入</div>
      </div>
    </div>
  `;
}

// ===== パネル描画 =====
function renderPanels() {
  const viewport = document.getElementById('panelViewport');

  panels.forEach((panel, i) => {
    if (!panel.el) {
      const el = document.createElement('div');
      el.className = 'panel state-incoming';
      el.innerHTML = `
        <div class="panel-scroll">
          <div class="panel-content" id="content-${i}">
            ${panel.html}
          </div>
        </div>
        <div class="selection-overlay" id="overlay-${i}"></div>
        <div class="selection-rect" id="rect-${i}"></div>
      `;
      viewport.appendChild(el);
      panel.el = el;
      setupSelectionOverlay(i);
    }

    if (i === currentIndex) {
      panel.el.className = 'panel state-current';
    } else if (i < currentIndex) {
      panel.el.className = 'panel state-behind';
    } else {
      panel.el.className = 'panel state-incoming';
    }
  });

  updateToolbar();
  if (window.lucide) {
    window.lucide.createIcons();
  }
}

// ===== 選択オーバーレイ =====
function setupSelectionOverlay(index) {
  const overlay = document.getElementById(`overlay-${index}`);
  const rect = document.getElementById(`rect-${index}`);
  const noSelectTypes = ['answer', 'question'];

  if (noSelectTypes.includes(panels[index]?.type)) {
    overlay.style.cursor = 'default';
    overlay.style.pointerEvents = 'none';
    return;
  }

  function getPos(e) {
    const r = overlay.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
  }

  overlay.addEventListener('mousedown', e => {
    if (index !== currentIndex || e.target !== overlay) return;
    e.preventDefault();
    clearSelection();
    isSelecting = true;
    activeOverlay = overlay;
    activeSelectionRect = rect;
    selectionStart = getPos(e);
    selection = { x: selectionStart.x, y: selectionStart.y, w: 0, h: 0 };
    rect.style.display = 'block';
    updateRect();
  });

  overlay.addEventListener('mousemove', e => {
    if (!isSelecting || activeOverlay !== overlay) return;
    e.preventDefault();
    const pos = getPos(e);
    selection = {
      x: Math.min(pos.x, selectionStart.x),
      y: Math.min(pos.y, selectionStart.y),
      w: Math.abs(pos.x - selectionStart.x),
      h: Math.abs(pos.y - selectionStart.y)
    };
    updateRect();
  });

  overlay.addEventListener('mouseup', e => {
    if (!isSelecting || activeOverlay !== overlay) return;
    isSelecting = false;
    if (selection && selection.w > 20 && selection.h > 20) {
      if (panels[index]?.type === 'pdf') {
        handlePDFSelection();
      } else {
        handleQuestionSelection(index);
      }
    } else {
      clearSelection();
    }
  });

  overlay.addEventListener('touchstart', e => {
    if (index !== currentIndex) return;
    e.preventDefault();
    clearSelection();
    isSelecting = true;
    activeOverlay = overlay;
    activeSelectionRect = rect;
    selectionStart = getPos(e);
    selection = { x: selectionStart.x, y: selectionStart.y, w: 0, h: 0 };
    rect.style.display = 'block';
  }, { passive: false });

  overlay.addEventListener('touchmove', e => {
    if (!isSelecting || activeOverlay !== overlay) return;
    e.preventDefault();
    const pos = getPos(e);
    selection = {
      x: Math.min(pos.x, selectionStart.x),
      y: Math.min(pos.y, selectionStart.y),
      w: Math.abs(pos.x - selectionStart.x),
      h: Math.abs(pos.y - selectionStart.y)
    };
    updateRect();
  }, { passive: false });

  overlay.addEventListener('touchend', e => {
    if (!isSelecting || activeOverlay !== overlay) return;
    isSelecting = false;
    if (selection && selection.w > 20 && selection.h > 20) {
      if (panels[index]?.type === 'pdf') {
        handlePDFSelection();
      } else {
        handleQuestionSelection(index);
      }
    } else {
      clearSelection();
    }
  });

  function updateRect() {
    rect.style.left = selection.x + 'px';
    rect.style.top = selection.y + 'px';
    rect.style.width = selection.w + 'px';
    rect.style.height = selection.h + 'px';
  }
}

function clearSelection() {
  if (activeSelectionRect) activeSelectionRect.style.display = 'none';
  selection = null;
  activeSelectionRect = null;
  activeOverlay = null;
}

// ===== パネル管理 =====
function pushPanel(type, html, label) {
  panels.slice(currentIndex + 1).forEach(p => p.el && p.el.remove());
  panels = panels.slice(0, currentIndex + 1);
  panels.push({ type, html, label, el: null });
  currentIndex = panels.length - 1;
  renderPanels();
  updateBreadcrumbs();
}

function goToPanel(index) {
  if (index < 0 || index >= panels.length) return;
  currentIndex = index;
  renderPanels();
  updateBreadcrumbs();
}

function updateBreadcrumbs() {
  const container = document.getElementById('breadcrumbs');
  container.innerHTML = panels.map((p, i) => {
    const isCurrent = i === currentIndex;
    return `
      ${i > 0 ? '<span class="breadcrumb-sep">›</span>' : ''}
      <span class="breadcrumb-item ${isCurrent ? 'current' : ''}"
            onclick="goToPanel(${i})">${p.label}</span>
    `;
  }).join('');
  container.scrollLeft = container.scrollWidth;
}

// ===== アクション =====
function handlePDFSelection() {
  clearSelection();
  pushPanel('answer', createAnswerPanelContent(), '解答記入');
}

function handleQuestionSelection(panelIndex) {
  const captureLabel = panels[panelIndex].type === 'scoring' ? '採点結果の一部' : 'AI回答の一部';
  clearSelection();
  pushPanel('question', createQuestionPanelContent(captureLabel), '質問記入');
}

function handleScoring() {
  const data = DUMMY_RESPONSES.scoring;
  pushPanel('scoring', createScoringPanelContent(data), '採点結果');
}

function handleQuestionSend() {
  const resp = DUMMY_RESPONSES.ai[aiResponseIndex % DUMMY_RESPONSES.ai.length];
  aiResponseIndex++;
  pushPanel('ai', createAIPanelContent(resp), resp.title.slice(0, 12) + '…');
}

function handleConfirm() {
  // ツールバーの確定ボタン（将来の実装用）
}

// ===== 初期化 =====
pushPanel('pdf', createPDFPanelContent(), 'PDF');
</script>
</body>
</html>
