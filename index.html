<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TutoTuto プロトタイプ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== ヘッダ ===== */
    header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      z-index: 100;
    }

    .app-title {
      font-size: 16px;
      font-weight: 700;
      color: #2c7be5;
      flex-shrink: 0;
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: #c0c8d8 #e8edf5;
      padding-bottom: 4px;
    }

    .breadcrumbs::-webkit-scrollbar {
      height: 4px;
      display: block;
    }

    .breadcrumbs::-webkit-scrollbar-track {
      background: #e8edf5;
      border-radius: 2px;
    }

    .breadcrumbs::-webkit-scrollbar-thumb {
      background: #c0c8d8;
      border-radius: 2px;
    }

    .breadcrumb-item {
      font-size: 13px;
      color: #2c7be5;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 12px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .breadcrumb-item:hover { background: #e8f0fd; }

    .breadcrumb-item.current {
      color: #555;
      cursor: default;
      font-weight: 600;
    }

    .breadcrumb-item.current:hover { background: none; }

    .breadcrumb-sep {
      color: #aaa;
      font-size: 13px;
    }

    /* ===== パネルコンテナ ===== */
    .panel-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel.state-current  { transform: translateX(0); }
    .panel.state-behind   { transform: translateX(-30%); }
    .panel.state-incoming { transform: translateX(100%); }

    /* ===== パネル内容 ===== */
    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      -webkit-overflow-scrolling: touch;
    }

    .panel-content {
      padding: 24px 20px 120px;
      position: relative;
      min-height: 100%;
    }

    /* PDF モックスタイル */
    .pdf-mock {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 24px;
      background: #fafafa;
      font-size: 15px;
      line-height: 1.8;
    }

    .pdf-mock h3 {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .pdf-problem {
      font-size: 16px;
      font-weight: 600;
      margin: 16px 0 8px;
    }

    .pdf-answer-area {
      border: 1px dashed #aaa;
      border-radius: 4px;
      min-height: 80px;
      padding: 12px;
      background: white;
      color: #c0392b;
      font-size: 18px;
      font-style: italic;
      margin-top: 8px;
    }

    /* 採点結果スタイル */
    .scoring-result {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
      align-self: flex-start;
    }

    .result-badge.wrong { background: #fde8e8; color: #c0392b; }
    .result-badge.correct { background: #e8f8e8; color: #27ae60; }

    .result-section {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
    }

    .result-section h4 {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .result-section p {
      font-size: 15px;
      line-height: 1.7;
      color: #333;
    }

    .result-answer {
      font-size: 20px;
      font-weight: 700;
      color: #2c7be5;
      font-family: 'Courier New', monospace;
    }

    /* AI回答スタイル */
    .ai-response {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ai-response h4 {
      font-size: 14px;
      color: #2c7be5;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .ai-response p {
      font-size: 15px;
      line-height: 1.8;
      color: #333;
    }

    .ai-response .math {
      background: #f0f4ff;
      border-left: 3px solid #2c7be5;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      line-height: 2;
    }

    .hint-text {
      font-size: 13px;
      color: #888;
      text-align: center;
      padding: 8px;
      border: 1px dashed #ccc;
      border-radius: 8px;
      margin-top: 8px;
    }

    /* ===== 選択オーバーレイ ===== */
    .selection-overlay {
      position: absolute;
      inset: 0;
      cursor: crosshair;
      z-index: 10;
    }

    .selection-rect {
      position: absolute;
      border: 2px solid #2c7be5;
      background: rgba(44, 123, 229, 0.12);
      border-radius: 3px;
      pointer-events: none;
      display: none;
    }

    /* ===== 入力バー ===== */
    .input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 200;
    }

    .input-bar.visible { transform: translateY(0); }

    .input-bar-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .selection-hint {
      font-size: 12px;
      color: #888;
    }

    .input-bar textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 100px;
    }

    .input-bar textarea:focus { border-color: #2c7be5; }

    .send-btn {
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #1a6cd4; }

    .cancel-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      padding: 4px;
      align-self: flex-end;
    }

    /* ===== パネルタイプラベル ===== */
    .panel-type-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="app-title">TutoTuto</div>
  <div class="breadcrumbs" id="breadcrumbs"></div>
</header>

<div class="panel-viewport" id="panelViewport"></div>

<div class="input-bar" id="inputBar">
  <div class="input-bar-inner">
    <div class="selection-hint" id="selectionHint"></div>
    <textarea id="inputText" rows="2" placeholder="質問やコメントを入力..."></textarea>
  </div>
  <button class="cancel-btn" id="cancelBtn">✕</button>
  <button class="send-btn" id="sendBtn">送信</button>
</div>

<script>
// ===== ダミーデータ =====
const DUMMY_RESPONSES = {
  scoring: {
    title: '採点結果',
    correct: false,
    yourAnswer: 'x = 2',
    correctAnswer: 'x = 3',
    explanation: '移項するとき、符号が変わることに注意しましょう。\n\n2x + 5 = 11 を解くには、まず両辺から5を引きます。\n2x = 6 となり、両辺を2で割ると x = 3 です。\n\nあなたは 2x = 4 と計算してしまいました。移項後の計算を確認しましょう。'
  },
  ai: [
    {
      title: 'なぜ移項で符号が変わるの？',
      content: `移項とは、等式の一方の辺の項を他方の辺に移すことです。\n\nこのとき符号が変わる理由は、「等式の両辺に同じ数を加えても等式は成り立つ」という性質を使っているからです。\n\n例えば、x + 3 = 7 を解くとき：\n両辺から3を引く → x + 3 - 3 = 7 - 3\nつまり x = 4\n\n「+3を移項して-3になる」と言いますが、本質的には「両辺から3を引いている」のです。`
    },
    {
      title: '類似問題で練習してみよう',
      content: `では、次の問題を解いてみてください。\n\n【練習問題】\n① 3x + 2 = 11\n② 5x - 7 = 13\n③ 2x + 9 = 3\n\n①のヒント：まず両辺から2を引いてみましょう。\n3x = 9 となります。あとは両辺を3で割るだけです。`
    },
    {
      title: 'この単元の要点',
      content: `一次方程式を解く手順：\n\n1. 文字を含む項を左辺に\n2. 数だけの項を右辺に集める（移項）\n3. ax = b の形にする\n4. 両辺を a で割る\n\nよくあるミス：\n・移項した後の符号を忘れる\n・両辺を割るとき計算ミス\n・分数の計算ミス`
    }
  ]
};

// ===== 状態管理 =====
let panels = [];
let currentIndex = -1;
let selection = null;
let isSelecting = false;
let selectionStart = { x: 0, y: 0 };
let activeOverlay = null;
let activeSelectionRect = null;
let aiResponseIndex = 0;

// ===== パネル作成 =====
function createPDFPanelContent() {
  return `
    <div class="panel-type-label">📄 PDF</div>
    <div class="pdf-mock">
      <h3>中学数学 方程式 ── 第3問</h3>
      <div class="pdf-problem">次の方程式を解きなさい。</div>
      <div style="font-size:20px; font-family:'Courier New',monospace; padding:16px 0;">
        2x + 5 = 11
      </div>
      <div style="font-size:14px; color:#888; margin-bottom:4px;">【解答欄】</div>
      <div class="pdf-answer-area">x = 2　←（生徒の解答）</div>
    </div>
    <div class="hint-text" style="margin-top:20px;">↑ 採点したい範囲をドラッグで囲んでください</div>
  `;
}

function createAnswerPanelContent() {
  return `
    <div class="panel-type-label">✏️ 解答記入</div>
    <div class="result-section" style="margin-bottom:16px;">
      <h4>採点対象</h4>
      <div style="background:#f0f4ff; border-radius:8px; padding:16px; font-family:'Courier New',monospace; font-size:18px; color:#333;">
        2x + 5 = 11
      </div>
    </div>
    <div class="result-section" style="margin-bottom:24px;">
      <h4>解答欄（ペンで記入）</h4>
      <div style="border:2px dashed #aaa; border-radius:8px; min-height:120px; background:white; display:flex; align-items:center; justify-content:center; color:#c0392b; font-size:18px; font-style:italic;">
        x = 2　←（生徒の解答）
      </div>
    </div>
    <button onclick="handleScoring()" style="width:100%; padding:14px; background:#2c7be5; color:white; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer;">
      送る
    </button>
  `;
}

function createScoringPanelContent(data) {
  return `
    <div class="panel-type-label">📝 採点結果</div>
    <div class="scoring-result">
      <div class="result-badge wrong">❌ 不正解</div>
      <div class="result-section">
        <h4>あなたの解答</h4>
        <p class="result-answer">${data.yourAnswer}</p>
      </div>
      <div class="result-section">
        <h4>正解</h4>
        <p class="result-answer">${data.correctAnswer}</p>
      </div>
      <div class="result-section">
        <h4>解説</h4>
        <p>${data.explanation.replace(/\n/g, '<br>')}</p>
      </div>
    </div>
    <div class="hint-text" style="margin-top:20px;">↑ 気になるところをドラッグで囲んで質問できます</div>
  `;
}

function createAIPanelContent(data) {
  return `
    <div class="panel-type-label">🤖 AI サポート</div>
    <div class="ai-response">
      <h4>${data.title}</h4>
      <p>${data.content.replace(/\n/g, '<br>')}</p>
    </div>
    <div class="hint-text" style="margin-top:20px;">↑ さらに気になるところを囲んで深掘りできます</div>
  `;
}

// ===== パネル描画 =====
function renderPanels() {
  const viewport = document.getElementById('panelViewport');

  panels.forEach((panel, i) => {
    if (!panel.el) {
      // DOM生成
      const el = document.createElement('div');
      el.className = 'panel state-incoming';
      el.innerHTML = `
        <div class="panel-scroll">
          <div class="panel-content" id="content-${i}">
            ${panel.html}
          </div>
        </div>
        <div class="selection-overlay" id="overlay-${i}"></div>
        <div class="selection-rect" id="rect-${i}"></div>
      `;
      viewport.appendChild(el);
      panel.el = el;
      setupSelectionOverlay(i);
    }

    // state更新
    if (i === currentIndex) {
      panel.el.className = 'panel state-current';
    } else if (i < currentIndex) {
      panel.el.className = 'panel state-behind';
    } else {
      panel.el.className = 'panel state-incoming';
    }
  });
}

// ===== 選択オーバーレイ =====
function setupSelectionOverlay(index) {
  const overlay = document.getElementById(`overlay-${index}`);
  const rect = document.getElementById(`rect-${index}`);

  function getPos(e) {
    const r = overlay.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: clientX - r.left,
      y: clientY - r.top
    };
  }

  // answer/questionパネルはオーバーレイ無効化
  const noSelectTypes = ['answer', 'question'];
  if (noSelectTypes.includes(panels[index]?.type)) {
    overlay.style.cursor = 'default';
    overlay.style.pointerEvents = 'none';
  }

  function startSelect(e) {
    if (index !== currentIndex) return;
    if (noSelectTypes.includes(panels[index]?.type)) return;
    if (e.target !== overlay) return;
    e.preventDefault();
    clearSelection();
    isSelecting = true;
    activeOverlay = overlay;
    activeSelectionRect = rect;
    const pos = getPos(e);
    selectionStart = pos;
    selection = { x: pos.x, y: pos.y, w: 0, h: 0 };
    rect.style.display = 'block';
    updateRect();
  }

  function moveSelect(e) {
    if (!isSelecting || activeOverlay !== overlay) return;
    e.preventDefault();
    const pos = getPos(e);
    selection = {
      x: Math.min(pos.x, selectionStart.x),
      y: Math.min(pos.y, selectionStart.y),
      w: Math.abs(pos.x - selectionStart.x),
      h: Math.abs(pos.y - selectionStart.y)
    };
    updateRect();
  }

  function endSelect(e) {
    if (!isSelecting || activeOverlay !== overlay) return;
    isSelecting = false;
    if (selection.w > 20 && selection.h > 20) {
      const panelType = panels[index]?.type;
      if (panelType === 'pdf') {
        handlePDFSelection();
      } else {
        handleQuestionSelection(index);
      }

    } else {
      clearSelection();
    }
  }

  function updateRect() {
    rect.style.left = selection.x + 'px';
    rect.style.top = selection.y + 'px';
    rect.style.width = selection.w + 'px';
    rect.style.height = selection.h + 'px';
  }

  overlay.addEventListener('mousedown', startSelect);
  overlay.addEventListener('mousemove', moveSelect);
  overlay.addEventListener('mouseup', endSelect);
  overlay.addEventListener('touchstart', startSelect, { passive: false });
  overlay.addEventListener('touchmove', moveSelect, { passive: false });
  overlay.addEventListener('touchend', endSelect);
}

function clearSelection() {
  if (activeSelectionRect) {
    activeSelectionRect.style.display = 'none';
  }
  selection = null;
  activeSelectionRect = null;
}

// ===== 入力バー =====
function showInputBar(panelIndex) {
  const panel = panels[panelIndex];
  const hint = panel.type === 'pdf'
    ? '選択範囲を採点します'
    : panel.type === 'answer'
    ? '選択範囲を採点します（コメント任意）'
    : '選択範囲について質問します';

  document.getElementById('selectionHint').textContent = hint;
  document.getElementById('inputText').value = '';
  const bar = document.getElementById('inputBar');
  bar.classList.add('visible');
  setTimeout(() => document.getElementById('inputText').focus(), 300);
}

function hideInputBar() {
  document.getElementById('inputBar').classList.remove('visible');
  clearSelection();
}

// ===== パネル追加 =====
function pushPanel(type, html, label) {
  // 現在より後のパネルを削除
  panels.slice(currentIndex + 1).forEach(p => p.el && p.el.remove());
  panels = panels.slice(0, currentIndex + 1);

  panels.push({ type, html, label, el: null });
  currentIndex = panels.length - 1;
  renderPanels();
  updateBreadcrumbs();
}

function goToPanel(index) {
  if (index < 0 || index >= panels.length) return;
  currentIndex = index;
  renderPanels();
  updateBreadcrumbs();
  hideInputBar();
}

// ===== パンくず =====
function updateBreadcrumbs() {
  const container = document.getElementById('breadcrumbs');
  container.innerHTML = panels.map((p, i) => {
    const isCurrent = i === currentIndex;
    return `
      ${i > 0 ? '<span class="breadcrumb-sep">›</span>' : ''}
      <span class="breadcrumb-item ${isCurrent ? 'current' : ''}"
            onclick="goToPanel(${i})">${p.label}</span>
    `;
  }).join('');
  // 最新のパンくずが見えるよう右端にスクロール
  container.scrollLeft = container.scrollWidth;
}

// ===== 送信処理 =====
function handleSend() {
  const text = document.getElementById('inputText').value.trim();
  const currentPanel = panels[currentIndex];
  hideInputBar();

  if (currentPanel.type === 'scoring' || currentPanel.type === 'ai') {
    // AI深掘りパネル
    const responses = DUMMY_RESPONSES.ai;
    const resp = responses[aiResponseIndex % responses.length];
    aiResponseIndex++;
    pushPanel('ai', createAIPanelContent(resp), resp.title.slice(0, 10) + '…');
  }
}

// ===== PDF範囲選択後 → 解答記入パネル =====
function handlePDFSelection() {
  clearSelection();
  pushPanel('answer', createAnswerPanelContent(), '解答記入');
}

// ===== 採点/AI結果で範囲選択後 → 質問記入パネル =====
function handleQuestionSelection(panelIndex) {
  const captureLabel = panels[panelIndex].type === 'scoring' ? '採点結果の一部' : 'AI回答の一部';
  clearSelection();
  pushPanel('question', createQuestionPanelContent(captureLabel), '質問記入');
}

function createQuestionPanelContent(captureLabel) {
  return `
    <div class="panel-type-label">💬 質問記入</div>
    <div class="result-section" style="margin-bottom:16px;">
      <h4>選択箇所（${captureLabel}）</h4>
      <div style="border:2px solid #2c7be5; border-radius:8px; min-height:80px; background:#f0f4ff; display:flex; align-items:center; justify-content:center; color:#2c7be5; font-size:13px; gap:8px;">
        <span style="font-size:24px;">📷</span> キャプチャ範囲
      </div>
    </div>
    <div class="result-section" style="margin-bottom:24px;">
      <h4>質問・コメント</h4>
      <textarea id="questionInput" rows="4" style="width:100%; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:15px; font-family:inherit; resize:none; outline:none;" placeholder="ここに質問を入力..."></textarea>
    </div>
    <button onclick="handleQuestionSend()" style="width:100%; padding:14px; background:#2c7be5; color:white; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer;">
      送る
    </button>
  `;
}

function handleQuestionSend() {
  const responses = DUMMY_RESPONSES.ai;
  const resp = responses[aiResponseIndex % responses.length];
  aiResponseIndex++;
  pushPanel('ai', createAIPanelContent(resp), resp.title.slice(0, 10) + '…');
}

// ===== 採点ボタン =====
function handleScoring() {
  const data = DUMMY_RESPONSES.scoring;
  pushPanel('scoring', createScoringPanelContent(data), '採点結果');
}

// ===== イベント =====
document.getElementById('sendBtn').addEventListener('click', handleSend);
document.getElementById('cancelBtn').addEventListener('click', hideInputBar);
document.getElementById('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ===== 初期化 =====
pushPanel('pdf', createPDFPanelContent(), 'PDF');
</script>
</body>
</html>
